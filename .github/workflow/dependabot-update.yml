name: Atualizar Dependências do Projeto com Dependabot
run-name: ${{ github.actor }} está atualizando as dependências do projeto

on:
  schedule:
    - cron: '0 2 * * *'  # Roda diariamente às 2h UTC
  workflow_dispatch:      # Permite disparo manual

jobs:
  dependency-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Verificar atualizações disponíveis
        run: npm outdated || true

      - name: Atualizar dependências
        run: npm update

      - name: Commitar atualizações
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && git diff --staged --quiet || git commit -am "chore: automated dependency update"
          git push

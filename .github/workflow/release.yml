name: Gerar versão do projeto
run-name: ${{ github.actor }} está gerando uma nova versão do projeto

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Empacotar extensão
        run: |
          zip -r MiExt-${{ github.sha }}.zip \
            manifest.json \
            popup.html \
            icons/ \
            src/

      - name: Executar Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
